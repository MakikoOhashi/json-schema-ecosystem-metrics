<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ajv npm weekly downloads</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe3;
      --panel: #fffaf0;
      --ink: #1f2933;
      --muted: #52606d;
      --bar: #1f7a8c;
      --bar-bg: #d9e2ec;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, var(--bg), #efe6d3);
      color: var(--ink);
    }

    main {
      max-width: 720px;
      margin: 48px auto;
      padding: 32px;
      background: var(--panel);
      border: 1px solid #d9cdb8;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    .value {
      margin: 24px 0 8px;
      font-size: 3rem;
      font-weight: 700;
    }

    .bar-shell {
      margin-top: 16px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
      height: 28px;
    }

    .bar {
      width: 520px;
      max-width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--bar), #3ba99c);
    }

    .meta {
      margin-top: 24px;
      font-size: 0.95rem;
    }

    code {
      font-family: "SFMono-Regular", Consolas, monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>ajv npm weekly downloads</h1>
    <p>Single-metric proof of concept for package adoption activity in the JSON Schema ecosystem.</p>
    <div class="value">264,141,721</div>
    <p>Downloads recorded for 2026-03-03 through 2026-03-09.</p>
    <div class="bar-shell" aria-label="Weekly downloads bar chart">
      <div class="bar"></div>
    </div>
    <div class="meta">
      <p><strong>Source:</strong> <code>https://api.npmjs.org/downloads/point/last-week/ajv</code></p>
      <p><strong>Fetched at:</strong> 2026-03-11T02:45:50.364Z</p>
    </div>
  </main>
</body>
</html>
